<!DOCTYPE html>

  <body class="page__main">
    <div class="buttons">
      <a class="btn btn-bir" id="musicToggle">
         🎈ấn vào đây để nghe nhạc nè
      </a>

      <a href="timeline.html" class="btn btn-timeline">👉Click cái này tiếp ha👈</a>

 <div id="cover"> note:Đúng ra là t để avt bạn thì chắc là đẹp hơn nhưng ko có sự cho phép b(nếu được mà b muốn nhớ nói với t để t thay cho nha😊) nên thôi để tạm cái bánh ăn cho no mắt nhé :D</div>
     <div id="songNote">🎶nhạc:CÔ GÁI M52-HUYR-CHẮC LÀ NEWVER-T NGHE HAY NÊN NGHE THỬ NHA😉</div>
    <audio id="player" loop>
       <source src="2026-01-21 17-52-21.mp3" type="audio/mp3" />  
    </audio>
    <script>
      const player = document.getElementById("player");
      const toggleText = document.getElementById("musicToggle");

      let isPlaying = false;

      toggleText.addEventListener("click", () => {
        if (!isPlaying) {
          player.play();
          toggleText.innerHTML = "🧨 tạm dừng nhạc";
        } else {
          player.pause();
          toggleText.innerHTML = "🎈 ấn vào đây để nghe nhạc!";
        }
        isPlaying = !isPlaying;
      });
    </script>
  </body>
</html>
