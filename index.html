<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="./img/CILKGax.png" />
    <title>Happy birthday</title>
    <link rel="stylesheet" href="./css/style.css" />

    <style>
      .btn-bir {
        cursor: pointer;
        user-select: none;
      }
    </style>
  </head>

  <body class="page__main">
    <div class="buttons">
      <a class="btn btn-bir" id="musicToggle">
         🎈ấn vào đây để nghe nhạc nè
      </a>

      <a href="timeline.html" class="btn btn-timeline">👉Click cái này tiếp ha👈</a>
    </div>


    <img src="https://kenh14cdn.com/203336854389633024/2021/3/7/1-16150665630681271218913.jpg" alt="" class="cover" />
 <p class="message">Hì😊🎂<br>
   Gửi cậu chút quà nhỏ của tớ 😊<br>
   Trông nó khá là khô khan <br>
   Nhưng tớ mong cậu sẽ thích nè💙<br>
   Lần đầu tớ làm nhiều chi tiết như này nên nó không được đẹp cậu thông cảm nhó 🌻🌻🌻<br>
    ps: Cậu ấn vào"👉Click cái này tiếp ha👈" xem mặt sau nữa nhé<3 <br>
</p>
    <audio id="player" loop>
       <source src="2026-01-21 17-52-21.mp3" type="audio/mp3" />  
    </audio>
    <script>
      const player = document.getElementById("player");
      const toggleText = document.getElementById("musicToggle");

      let isPlaying = false;

      toggleText.addEventListener("click", () => {
        if (!isPlaying) {
          player.play();
          toggleText.innerHTML = "🧨 tạm dừng nhạc";
        } else {
          player.pause();
          toggleText.innerHTML = "🎈 ấn vào đây để nghe nhạc!";
        }
        isPlaying = !isPlaying;
      });
    </script>
  </body>
</html>
